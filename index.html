<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产品净含量信息录入系统</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 600px;
            overflow: hidden;
            animation: slideUp 0.5s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        .header h1 { font-size: 26px; margin-bottom: 8px; }
        .header p { opacity: 0.85; font-size: 14px; }
        .content { padding: 40px 30px; }
        .page-title {
            font-size: 18px;
            font-weight: 700;
            color: #374151;
            margin-bottom: 24px;
            text-align: center;
        }
        .page-title .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #667eea;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 12px;
            transition: color 0.2s;
        }
        .page-title .back-btn:hover { color: #764ba2; }
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .menu-card {
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            padding: 32px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .menu-card:hover {
            border-color: #667eea;
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(102, 126, 234, 0.2);
            background: white;
        }
        .menu-card .icon {
            font-size: 40px;
            margin-bottom: 12px;
            display: block;
        }
        .menu-card .label {
            font-size: 16px;
            font-weight: 700;
            color: #1e293b;
        }
        .menu-card .desc {
            font-size: 12px;
            color: #64748b;
            margin-top: 6px;
        }
        .hidden { display: none !important; }
        .fade-in {
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .breadcrumb {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #6b7280;
        }
        .breadcrumb span { color: #d1d5db; }
        .breadcrumb .active { color: #667eea; font-weight: 600; }
        .footer-link {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
        }
        .footer-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
        }
        .footer-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📦 产品净含量信息录入系统</h1>
            <p>请选择产品类型进入录入页面</p>
        </div>
        <div class="content">
            <!-- 第一级：主菜单 -->
            <div id="page-main" class="fade-in">
                <div class="page-title">请选择产品归属</div>
                <div class="menu-grid">
                    <div class="menu-card" onclick="goToPage('chunguang')">
                        <span class="icon">🌿</span>
                        <div class="label">春光产品</div>
                        <div class="desc">春光自有品牌产品</div>
                    </div>
                    <div class="menu-card" onclick="goToPage('oem')">
                        <span class="icon">🏭</span>
                        <div class="label">代加工产品</div>
                        <div class="desc">OEM/ODM 代工产品</div>
                    </div>
                </div>
            </div>

            <!-- 第二级：春光产品 -->
            <div id="page-chunguang" class="hidden">
                <div class="breadcrumb">
                    <span class="active">春光产品</span>
                    <span>›</span>
                    <span>选择包装类型</span>
                </div>
                <div class="page-title">
                    <div class="back-btn" onclick="goToPage('main')">← 返回上级</div>
                    <div>请选择包装形式</div>
                </div>
                <div class="menu-grid">
                    <a href="form.html?brand=春光&package=纸包" class="menu-card">
                        <span class="icon">📄</span>
                        <div class="label">纸包产品</div>
                        <div class="desc">纸质包装系列产品</div>
                    </a>
                    <a href="form.html?brand=春光&package=PET" class="menu-card">
                        <span class="icon">🥤</span>
                        <div class="label">PET 产品</div>
                        <div class="desc">PET 塑料包装系列</div>
                    </a>
                </div>
            </div>

            <!-- 第二级：代加工产品 -->
            <div id="page-oem" class="hidden">
                <div class="breadcrumb">
                    <span class="active">代加工产品</span>
                    <span>›</span>
                    <span>选择包装类型</span>
                </div>
                <div class="page-title">
                    <div class="back-btn" onclick="goToPage('main')">← 返回上级</div>
                    <div>请选择包装形式</div>
                </div>
                <div class="menu-grid">
                    <a href="form.html?brand=代加工&package=纸包" class="menu-card">
                        <span class="icon">📄</span>
                        <div class="label">纸包产品</div>
                        <div class="desc">纸质包装代工产品</div>
                    </a>
                    <a href="form.html?brand=代加工&package=PET" class="menu-card">
                        <span class="icon">🥤</span>
                        <div class="label">PET 产品</div>
                        <div class="desc">PET 塑料包装代工产品</div>
                    </a>
                </div>
            </div>

            <div class="footer-link">
                <a href="summary.html">📊 进入数据汇总页面（管理员）</a>
            </div>
        </div>
    </div>

    <script>
        function goToPage(page) {
            document.querySelectorAll('[id^="page-"]').forEach(el => {
                el.classList.add('hidden');
                el.classList.remove('fade-in');
            });
            const target = document.getElementById('page-' + page);
            target.classList.remove('hidden');
            target.classList.add('fade-in');
        }
    </script>
</body>
</html>
